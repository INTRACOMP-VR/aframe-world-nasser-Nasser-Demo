		<script>
			(function () {
				function applyGltfColor(entity) {
					if (!entity.hasAttribute('gltf-model') || !entity.hasAttribute('material')) return;
					var mat = entity.getAttribute('material');
					var color = mat && mat.color;
					if (!color) return;
					var mesh = entity.getObject3D('mesh');
					if (!mesh) return;
					var c = new THREE.Color(color);
					mesh.traverse(function (node) {
						if (node.isMesh && node.material) {
							if (Array.isArray(node.material)) {
								node.material = node.material.map(function (m) {
									var cloned = m.__gltfTintClone ? m : m.clone();
									cloned.__gltfTintClone = true;
									if (cloned.color) cloned.color.copy(c);
									cloned.needsUpdate = true;
									return cloned;
								});
							} else {
								if (!node.material.__gltfTintClone) {
									node.material = node.material.clone();
									node.material.__gltfTintClone = true;
								}
								if (node.material.color) node.material.color.copy(c);
								node.material.needsUpdate = true;
							}
						}
					});
				}
				function attach(entity) {
					if (entity.__gltfTintAttached) return;
					entity.__gltfTintAttached = true;
					entity.addEventListener('model-loaded', function () { applyGltfColor(entity); });
					entity.addEventListener('componentchanged', function (e) {
						if (e.detail && e.detail.name === 'material') applyGltfColor(entity);
					});
					if (entity.getObject3D && entity.getObject3D('mesh')) applyGltfColor(entity);
				}
				document.addEventListener('DOMContentLoaded', function () {
					var scene = document.querySelector('a-scene');
					if (!scene) return;
					scene.querySelectorAll('*').forEach(attach);
					scene.addEventListener('child-attached', function (e) {
						if (e.detail && e.detail.el) attach(e.detail.el);
					});
				});
			})();
